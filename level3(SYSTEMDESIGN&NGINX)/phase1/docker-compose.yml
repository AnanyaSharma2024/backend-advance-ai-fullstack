services:
  nginx:
    image: nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server1:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      SERVER_NAME: PHELA SERVER
    ports:
      - "5001:7000"

  server2:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      SERVER_NAME: PHELA SERVER 2
    ports:
      - "5002:7000"

  server3:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      SERVER_NAME: PHELA SERVER 3
    ports:
      - "5003:7000"
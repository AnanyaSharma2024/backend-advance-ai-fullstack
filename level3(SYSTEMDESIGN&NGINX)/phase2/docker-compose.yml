services:
  nginx:
    image: nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  gateway1:
    build: ./backend/gateway
    env_file:
      - ./backend/gateway/.env
    environment:
      - SERVER_NAME: PHELA GATEWAY 1
    ports:
      - "8001:5000"

  gateway2:
    build: ./backend/gateway
    env_file:
      - ./backend/gateway/.env
    environment:
      - SERVER_NAME: DOSRA GATEWAY 2
    ports:
      - "8002:8000"  

  auth-service:
    build: ./backend/services/auth
    env_file:
      - ./backend/services/auth/.env
    environment:
      - SERVER_NAME: PHELA AUTH SERVICE
    ports:
      - "5001:8001"

  order-service:
    build: ./backend/services/order
    env_file:
      - ./backend/services/order/.env
    environment:
      - SERVER_NAME: PHELA ORDER SERVICE
    ports:
      - "5002:8002"

    product-service:
      build: ./backend/services/product
      env_file:
        - ./backend/services/product/.env
      environment:
        - SERVER_NAME: PHELA PRODUCT SERVICE
      ports:
        - "5003:8003"